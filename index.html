<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Cop AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; margin-top: 12px; }
    input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input[type=text]:focus { border-color: #1D9E75; }
    .ing-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .ing-row input { flex: 1; }
    .add-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 0 16px; cursor: pointer; font-size: 20px; color: #444; }
    .add-btn:hover { background: #f5f5f5; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; min-height: 30px; }
    .tag { background: #f0f0f0; border: 1px solid #ddd; border-radius: 20px; padding: 4px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .tag span { cursor: pointer; color: #999; font-size: 14px; }
    .task-row { display: flex; gap: 8px; margin: 8px 0 1rem; }
    .task-btn { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; color: #666; }
    .task-btn.active { border-color: #1D9E75; background: #E1F5EE; color: #0F6E56; font-weight: 500; }
    .submit-btn { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .verdict { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: 1px; }
    .verdict.safe { color: #0F6E56; }
    .verdict.dangerous { color: #993C1D; }
    .score-row { display: flex; gap: 12px; margin-bottom: 1rem; }
    .metric { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; flex: 1; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 18px; font-weight: 600; }
    .flag-item { font-size: 13px; padding: 8px 12px; background: #fff5f0; border-left: 3px solid #D85A30; border-radius: 4px; margin-bottom: 6px; }
    .safe-msg { font-size: 13px; color: #666; margin-bottom: 1rem; }
    .ai-box { font-size: 13px; color: #444; background: #f9f9f9; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; border: 1px solid #eee; }
    .loader { text-align: center; padding: 2rem; color: #666; font-size: 14px; }
    .err { color: #993C1D; font-size: 13px; padding: 12px; background: #FAECE7; border-radius: 8px; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; margin-left: 8px; font-weight: 500; }
    .status-bar { font-size: 12px; color: #888; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; }
    .dot.green { background: #1D9E75; }
    .dot.red { background: #993C1D; }
    .dot.pulse { background: #f0a500; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Food Cop AI <span class="badge">FSSAI + EFSA</span></h1>
    <p class="sub">Brutal Indian food safety inspector — paste your ingredients, get the truth</p>

    <!-- API status indicator -->
    <div class="status-bar">
      <span class="dot pulse" id="status-dot"></span>
      <span id="status-text">Connecting to server...</span>
    </div>

    <div class="card">
      <label>Product name</label>
      <input type="text" id="product" placeholder="e.g. Maggi Noodles, Candy Bar...">

      <label>Add ingredients and click "+"</label>
      <div class="ing-row">
        <input type="text" id="ing-input" placeholder="e.g. E128, MSG, sugar, TBHQ..." onkeydown="if(event.key==='Enter')addIng()">
        <button class="add-btn" onclick="addIng()">+</button>
      </div>
      <div class="tags" id="tags"></div>

      <label>Task difficulty</label>
      <div class="task-row">
        <button class="task-btn active" onclick="setTask('task_easy', this)">Easy</button>
        <button class="task-btn" onclick="setTask('task_medium', this)">Medium</button>
        <button class="task-btn" onclick="setTask('task_hard', this)">Hard</button>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="analyze()">Analyze Food Product</button>
    </div>

    <div id="result-area"></div>
  </div>

  <script>
    let ingredients = [];
    let taskId = 'task_easy';

    // ✅ FIX 1: Correct HF Space URL format (lowercase, underscores → hyphens)
    const API = 'https://foodcop/food-cop_open-env.hf.space';

    // ✅ FIX 2: Wake up the HF Space on page load (spaces go to sleep)
    async function pingServer() {
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      dot.className = 'dot pulse';
      txt.textContent = 'Waking up server (may take 30s)...';

      for (let i = 0; i < 10; i++) {
        try {
          const r = await fetch(`${API}/`, { method: 'GET', signal: AbortSignal.timeout(8000) });
          if (r.ok || r.status === 404) { // 404 is fine — server is alive
            dot.className = 'dot green';
            txt.textContent = 'Server is online ✓';
            return true;
          }
        } catch (e) {
          // still waking up
        }
        await sleep(4000);
        txt.textContent = `Waking up server... (attempt ${i + 2}/10)`;
      }

      dot.className = 'dot red';
      txt.textContent = 'Server offline — HF Space may be down';
      return false;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function addIng() {
      const inp = document.getElementById('ing-input');
      const val = inp.value.trim();
      if (!val) return;
      ingredients.push(val);
      inp.value = '';
      inp.focus();
      renderTags();
    }

    function renderTags() {
      const c = document.getElementById('tags');
      c.innerHTML = ingredients.map((ing, i) =>
        `<div class="tag">${ing} <span onclick="removeIng(${i})">×</span></div>`
      ).join('');
    }

    function removeIng(i) {
      ingredients.splice(i, 1);
      renderTags();
    }

    function setTask(id, btn) {
      taskId = id;
      document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function analyze() {
      const product = document.getElementById('product').value.trim();
      if (!product) { alert('Enter a product name!'); return; }
      if (ingredients.length === 0) { alert('Add at least one ingredient!'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';
      document.getElementById('result-area').innerHTML =
        '<div class="loader">Checking against FSSAI and EFSA database...</div>';

      try {
        // ✅ FIX 3: POST /reset first (required by the env), then /step
        try {
          await fetch(`${API}/reset`, { method: 'POST', signal: AbortSignal.timeout(10000) });
        } catch (_) { /* reset failing is non-fatal */ }

        const res = await fetch(`${API}/step`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // ✅ FIX 4: timeout so it doesn't hang forever
          signal: AbortSignal.timeout(30000),
          body: JSON.stringify({ product_name: product, ingredients, task_id: taskId })
        });

        if (!res.ok) {
          throw new Error(`Server returned ${res.status}: ${res.statusText}`);
        }

        const data = await res.json();
        renderResult(data);

      } catch (e) {
        // ✅ FIX 5: Human-readable error messages
        let msg = e.message || 'Unknown error';
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
          msg = `Cannot reach the API at ${API}. Check that your HF Space is running.`;
        } else if (msg.includes('timeout') || msg.includes('AbortError')) {
          msg = 'Request timed out. The server is taking too long — try again in a few seconds.';
        }
        document.getElementById('result-area').innerHTML = `<div class="err">❌ ${msg}</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Analyze Food Product';
    }

    function renderResult(data) {
      const obs = data.observation || {};
      const verdict = obs.verdict || 'UNKNOWN';
      const flagged = obs.flagged_ingredients || [];
      const reward = data.reward ?? 0;
      const ai = obs.ai_analysis || '';

      let aiParsed = {};
      try { aiParsed = JSON.parse(ai); } catch (e) {}

      const risk = aiParsed.health_risk || (flagged.length > 0 ? 'HIGH' : 'LOW');
      const whoAtRisk = aiParsed.who_is_at_risk || 'none';
      const source = aiParsed.source || 'FSSAI + EFSA';
      const reason = aiParsed.reason || ai;

      document.getElementById('result-area').innerHTML = `
        <div class="card">
          <div class="verdict ${verdict === 'SAFE' ? 'safe' : 'dangerous'}">${verdict}</div>
          <div class="score-row">
            <div class="metric">
              <div class="metric-label">Score</div>
              <div class="metric-value">${reward.toFixed(2)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Health risk</div>
              <div class="metric-value">${risk}</div>
            </div>
            <div class="metric">
              <div class="metric-label">At risk</div>
              <div class="metric-value" style="font-size:13px;padding-top:4px">${whoAtRisk}</div>
            </div>
          </div>

          ${flagged.length > 0 ? `
            <label>Flagged ingredients (${source})</label>
            ${flagged.map(f => `<div class="flag-item">${f}</div>`).join('')}
          ` : `<p class="safe-msg">No banned ingredients found in database.</p>`}

          ${reason ? `<label>AI Verdict</label><div class="ai-box">${reason}</div>` : ''}
        </div>
      `;
    }

    // Wake up the server as soon as page loads
    pingServer();
  </script>
</body>
</html>
