name: food_cop_ai
version: 1.0.0
description: >
  Food Cop AI is a real-world food safety inspection environment.
  An LLM agent analyzes product ingredient lists to detect banned,
  harmful, or dangerous additives based on FSSAI and EFSA regulations.

tags:
  - openenv
  - food-safety
  - real-world
  - llm-agent

tasks:
  - name: food_check_easy
    difficulty: easy
    description: Detect a single clearly banned ingredient in a product.

  - name: food_check_medium
    difficulty: medium
    description: Detect sodium benzoate in an energy drink.

  - name: food_check_hard
    difficulty: hard
    description: Detect multiple dangerous additives in a processed snack.

observation_space:
  type: object
  fields:
    - product_name: string
    - ingredients: list[string]
    - step: integer
    - verdict: string
    - flagged_ingredients: list[string]

action_space:
  type: object
  fields:
    - product_name: string
    - ingredients: list[string]

endpoints:
  - GET  /health
  - POST /reset
  - POST /step
  - GET  /state