spec_version: 1
name: food_cop_ai
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0.5"
description: >
  Food Cop AI is a real-world food safety inspection environment.
  An LLM agent analyzes product ingredient lists to detect banned,
  harmful, or dangerous additives using food safety rules.

tags:
  - openenv
  - food-safety
  - real-world
  - llm-agent

tasks:
  - id: food_check_easy
    name: food_check_easy
    grader: server.graders.easy_grader.grade
    difficulty: easy
    description: Detect a single clearly banned ingredient in a product.
    max_steps: 4
    score_range: [0.05, 0.94]

  - id: food_check_medium
    name: food_check_medium
    grader: server.graders.medium_grader.grade
    difficulty: medium
    description: Detect dangerous additives in a drink.
    max_steps: 4
    score_range: [0.05, 0.94]

  - id: food_check_hard
    name: food_check_hard
    grader: server.graders.hard_grader.grade
    difficulty: hard
    description: Detect multiple dangerous additives in a snack.
    max_steps: 4
    score_range: [0.05, 0.94]

observation_space:
  type: object
  fields:
    product_name: string
    ingredients: list[string]
    step: integer
    verdict: string
    flagged_ingredients: list[string]
    ai_analysis: string

action_space:
  type: object
  fields:
    product_name: string
    ingredients: list[string]
    task_id: string

endpoints:
  - GET /health
  - POST /reset
  - POST /step
  - GET /state
