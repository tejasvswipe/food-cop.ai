name: food_cop_ai
version: 1.0.0
description: >
  Food Cop AI is a real-world food safety inspection environment.
  An LLM agent analyzes product ingredient lists to detect banned,
  harmful, or dangerous additives based on FSSAI and EFSA regulations.

tags:
  - openenv
  - food-safety
  - real-world
  - llm-agent

tasks:
  - name: food_check_easy
    difficulty: easy
    description: Detect a single clearly banned ingredient (E128) in a candy bar.
    reward_range: [0.0, 2.0]

  - name: food_check_medium
    difficulty: medium
    description: >
      Detect sodium benzoate (E211) in an energy drink — dangerous when
      combined with vitamin C forming benzene.
    reward_range: [0.0, 2.0]

  - name: food_check_hard
    difficulty: hard
    description: >
      Detect multiple dangerous additives (E621, E951, TBHQ, trans fats, E128)
      in a processed snack across FSSAI and EFSA banned lists.
    reward_range: [0.0, 2.0]

observation_space:
  type: object
  fields:
    - product_name: string
    - ingredients: list[string]
    - step: integer
    - verdict: string  # SAFE or DANGEROUS
    - flagged_ingredients: list[string]

action_space:
  type: object
  fields:
    - product_name: string
    - ingredients: list[string]

reward_function: >
  +1.0 for correctly identifying a dangerous ingredient in step 1 (LLM analysis).
  +1.0 for correctly flagging product as UNSAFE in step 2 (LLM verification).
  0.0 if agent misses dangerous ingredients.

endpoints:
  - GET  /health   - Health check
  - POST /reset    - Reset environment state
  - POST /step     - Submit food product for analysis
  - GET  /state    - Get current environment state
